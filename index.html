<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestlé — Bienestar</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600;700&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --nestle-red: #d72b2b;
        --nestle-dark: #1a1a1a;
        --nestle-mid: #3d3d3d;
        --nestle-soft: #f5f3ef;
        --nestle-white: #ffffff;
        --nestle-muted: #9a9a9a;
        --accent: #d72b2b;
        --radius: 16px;
        --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      html,
      body {
        height: 100%;
        font-family: "Noto Sans", sans-serif;
        background: var(--nestle-soft);
        color: var(--nestle-dark);
        overflow: hidden;
      }

      /* ─── SPLASH ──────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        background: var(--nestle-red);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
      }
      #splash.hide {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }
      #splash img {
        width: 220px;
        filter: brightness(0) invert(1);
        margin-bottom: 40px;
      }
      .splash-bar-track {
        width: 220px;
        height: 3px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 99px;
        overflow: hidden;
      }
      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background: #fff;
        border-radius: 99px;
        animation: loadbar 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes loadbar {
        to {
          width: 100%;
        }
      }
      .splash-label {
        margin-top: 14px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }

      /* ─── APP SHELL ───────────────────────────────────────── */
      #app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        opacity: 0;
        transition: opacity 0.6s ease 0.1s;
      }
      #app.visible {
        opacity: 1;
      }

      header {
        background: var(--nestle-white);
        border-bottom: 1px solid #e8e4de;
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      header img {
        height: 36px;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--nestle-muted);
      }
      .worker-badge {
        background: var(--nestle-soft);
        border: 1px solid #e0ddd7;
        border-radius: 99px;
        padding: 5px 14px;
        font-size: 12px;
        font-weight: 600;
        color: var(--nestle-mid);
        letter-spacing: 0.04em;
      }

      main {
        flex: 1;
        overflow-y: auto;
        padding: 40px 24px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }

      /* ─── SCREENS ─────────────────────────────────────────── */
      .screen {
        display: none;
        width: 100%;
        max-width: 640px;
        animation: fadeUp 0.4s ease;
      }
      .screen.active {
        display: block;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── LOGIN ───────────────────────────────────────────── */
      .card {
        background: var(--nestle-white);
        border-radius: var(--radius);
        padding: 40px 36px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      }
      .card-eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--nestle-red);
        margin-bottom: 10px;
      }
      .card h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
        color: var(--nestle-dark);
      }
      .card p {
        font-size: 14px;
        color: var(--nestle-muted);
        margin-bottom: 28px;
        line-height: 1.6;
      }

      .field {
        margin-bottom: 18px;
      }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--nestle-mid);
        margin-bottom: 6px;
        letter-spacing: 0.04em;
      }
      .field input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #e0ddd7;
        border-radius: 10px;
        font-family: inherit;
        font-size: 15px;
        outline: none;
        transition: border-color var(--transition);
        background: var(--nestle-soft);
        color: var(--nestle-dark);
      }
      .field input:focus {
        border-color: var(--nestle-red);
        background: #fff;
      }

      .btn-primary {
        width: 100%;
        padding: 14px;
        background: var(--nestle-red);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition:
          background var(--transition),
          transform 0.15s;
      }
      .btn-primary:hover {
        background: #b82020;
      }
      .btn-primary:active {
        transform: scale(0.98);
      }

      .btn-link {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--nestle-red);
        font-size: 13px;
        font-family: inherit;
        margin-top: 14px;
        display: block;
        text-align: center;
        text-decoration: underline;
      }

      /* ─── SURVEY ──────────────────────────────────────────── */
      .survey-progress {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }
      .progress-track {
        flex: 1;
        height: 4px;
        background: #e0ddd7;
        border-radius: 99px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--nestle-red);
        border-radius: 99px;
        transition: width 0.5s ease;
      }
      .progress-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--nestle-muted);
        white-space: nowrap;
      }

      .question-card {
        background: var(--nestle-white);
        border-radius: var(--radius);
        padding: 36px 32px 28px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
        margin-bottom: 20px;
      }
      .question-eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--nestle-muted);
        margin-bottom: 10px;
      }
      .question-text {
        font-size: 19px;
        font-weight: 700;
        color: var(--nestle-dark);
        line-height: 1.4;
        margin-bottom: 30px;
      }

      /* Emoji options */
      .emoji-grid {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .emoji-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 18px 14px;
        min-width: 90px;
        border: 2px solid #e0ddd7;
        border-radius: 14px;
        background: var(--nestle-soft);
        cursor: pointer;
        transition: all var(--transition);
        font-family: inherit;
      }
      .emoji-btn i {
        font-size: 32px;
        transition: transform 0.2s;
      }
      .emoji-btn span {
        font-size: 11px;
        font-weight: 600;
        color: var(--nestle-muted);
        letter-spacing: 0.04em;
      }
      .emoji-btn:hover {
        border-color: var(--nestle-red);
        background: #fff;
      }
      .emoji-btn:hover i {
        transform: scale(1.15);
      }
      .emoji-btn.selected {
        border-color: var(--nestle-red);
        background: #fff0f0;
      }
      .emoji-btn.selected span {
        color: var(--nestle-red);
      }

      /* Scale bar */
      .scale-bar {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .scale-btn {
        flex: 1;
        aspect-ratio: 1;
        border: 2px solid #e0ddd7;
        border-radius: 10px;
        background: var(--nestle-soft);
        font-size: 15px;
        font-weight: 700;
        color: var(--nestle-muted);
        cursor: pointer;
        transition: all var(--transition);
        font-family: inherit;
      }
      .scale-btn:hover {
        border-color: var(--nestle-red);
        color: var(--nestle-dark);
        background: #fff;
      }
      .scale-btn.selected {
        background: var(--nestle-red);
        border-color: var(--nestle-red);
        color: #fff;
      }
      .scale-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
      }
      .scale-labels span {
        font-size: 11px;
        color: var(--nestle-muted);
      }

      /* Open text */
      .open-textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #e0ddd7;
        border-radius: 10px;
        resize: none;
        font-family: inherit;
        font-size: 15px;
        background: var(--nestle-soft);
        color: var(--nestle-dark);
        outline: none;
        transition: border-color var(--transition);
        line-height: 1.6;
      }
      .open-textarea:focus {
        border-color: var(--nestle-red);
        background: #fff;
      }

      .nav-row {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }
      .btn-secondary {
        padding: 12px 24px;
        border: 1.5px solid #e0ddd7;
        border-radius: 10px;
        background: transparent;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        color: var(--nestle-mid);
        cursor: pointer;
        transition: all var(--transition);
      }
      .btn-secondary:hover {
        border-color: var(--nestle-mid);
        background: var(--nestle-soft);
      }
      .btn-next {
        padding: 12px 28px;
        background: var(--nestle-red);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background var(--transition);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-next:hover {
        background: #b82020;
      }
      .btn-next:disabled {
        background: #e0ddd7;
        cursor: default;
      }

      /* ─── THANK YOU ───────────────────────────────────────── */
      .thanks-card {
        background: var(--nestle-white);
        border-radius: var(--radius);
        padding: 60px 40px;
        text-align: center;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      }
      .thanks-icon {
        width: 80px;
        height: 80px;
        background: #fff0f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }
      .thanks-icon i {
        font-size: 36px;
        color: var(--nestle-red);
      }
      .thanks-card h2 {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .thanks-card p {
        font-size: 15px;
        color: var(--nestle-muted);
        line-height: 1.7;
        max-width: 340px;
        margin: 0 auto 32px;
      }
      .thanks-countdown {
        font-size: 13px;
        color: var(--nestle-muted);
        margin-top: 16px;
      }

      footer {
        height: 44px;
        background: var(--nestle-white);
        border-top: 1px solid #e8e4de;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: var(--nestle-muted);
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <!-- SPLASH -->
    <div id="splash">
      <img
        src="https://upload.wikimedia.org/wikipedia/sco/thumb/d/d8/Nestl%C3%A9.svg/3840px-Nestl%C3%A9.svg.png"
        alt="Nestlé"
      />
      <div class="splash-bar-track"><div class="splash-bar-fill"></div></div>
      <p class="splash-label">Sistema de Bienestar</p>
    </div>

    <!-- APP -->
    <div id="app">
      <header>
        <img
          src="https://upload.wikimedia.org/wikipedia/sco/thumb/d/d8/Nestl%C3%A9.svg/3840px-Nestl%C3%A9.svg.png"
          alt="Nestlé"
        />
        <div class="header-right">
          <span
            class="worker-badge"
            id="workerLabel"
            style="display: none"
          ></span>
        </div>
      </header>

      <main>
        <!-- LOGIN -->
        <div class="screen active" id="screen-login">
          <div class="card">
            <p class="card-eyebrow">Bienestar Laboral</p>
            <h2>Bienvenido</h2>
            <p>
              Ingresa tu número de trabajador para comenzar la evaluación de
              hoy.
            </p>

            <div class="field">
              <label>Número de trabajador</label>
              <input
                type="text"
                id="workerNum"
                placeholder="Ej. 00452"
                maxlength="10"
              />
            </div>
            <div class="field">
              <label>Contraseña</label>
              <input type="password" id="workerPass" placeholder="••••••••" />
            </div>
            <button class="btn-primary" onclick="doLogin()">Ingresar</button>
            <button
              class="btn-link"
              onclick="
                alert(
                  'Se enviará un enlace de recuperación a tu correo Google registrado.',
                )
              "
            >
              Olvidé mi contraseña
            </button>
          </div>
        </div>

        <!-- SURVEY -->
        <div class="screen" id="screen-survey">
          <div class="survey-progress">
            <div class="progress-track">
              <div
                class="progress-fill"
                id="progressFill"
                style="width: 0%"
              ></div>
            </div>
            <span class="progress-label" id="progressLabel">1 / 5</span>
          </div>
          <div id="questionContainer"></div>
          <div class="nav-row">
            <button
              class="btn-secondary"
              id="btnBack"
              onclick="prevQuestion()"
              style="display: none"
            >
              <i class="fa-solid fa-arrow-left"></i> Atrás
            </button>
            <button
              class="btn-next"
              id="btnNext"
              onclick="nextQuestion()"
              disabled
            >
              Siguiente <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <!-- THANKS -->
        <div class="screen" id="screen-thanks">
          <div class="thanks-card">
            <div class="thanks-icon"><i class="fa-solid fa-heart"></i></div>
            <h2>¡Gracias!</h2>
            <p>
              Tu respuesta ha sido registrada. Tu bienestar es importante para
              el equipo Nestlé.
            </p>
            <button
              class="btn-primary"
              style="max-width: 220px; margin: 0 auto"
              onclick="resetApp()"
            >
              Nueva sesión
            </button>
            <p class="thanks-countdown" id="countdownLabel"></p>
          </div>
        </div>
      </main>

      <footer>
        NESTLÉ &nbsp;·&nbsp; SISTEMA DE BIENESTAR LABORAL &nbsp;·&nbsp;
        CONFIDENCIAL
      </footer>
    </div>

    <script>
      // ⚠️ PEGA AQUÍ LA URL QUE TE DIO GOOGLE APPS SCRIPT AL DESPLEGAR
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbw77O8m3YepIaCqSJFXQQ-EBE_SkavyVkKiowC3NxjxgMra60fbLRmI5xlklxwD4pMjcQ/exec";

      let QUESTIONS = [
        {
          id: 1,
          eyebrow: "Estado emocional",
          text: "¿Cómo te sientes hoy al llegar al trabajo?",
          type: "emoji",
          options: [
            {
              icon: "fa-regular fa-face-grin-stars",
              label: "Excelente",
              value: 5,
            },
            { icon: "fa-regular fa-face-smile", label: "Bien", value: 4 },
            { icon: "fa-regular fa-face-meh", label: "Regular", value: 3 },
            { icon: "fa-regular fa-face-frown", label: "Mal", value: 2 },
            { icon: "fa-regular fa-face-tired", label: "Agotado", value: 1 },
          ],
        },
        {
          id: 2,
          eyebrow: "Energía y rendimiento",
          text: "¿Qué tan cargado de energía te sientes para trabajar hoy?",
          type: "scale",
          min: "Sin energía",
          max: "Muy energético",
        },
        {
          id: 3,
          eyebrow: "Ambiente laboral",
          text: "¿Cómo calificarías el ambiente con tu equipo esta semana?",
          type: "emoji",
          options: [
            { icon: "fa-solid fa-handshake", label: "Excelente", value: 5 },
            { icon: "fa-regular fa-thumbs-up", label: "Bien", value: 4 },
            { icon: "fa-solid fa-people-arrows", label: "Tenso", value: 2 },
            {
              icon: "fa-regular fa-face-frown-open",
              label: "Difícil",
              value: 1,
            },
          ],
        },
        {
          id: 4,
          eyebrow: "Carga de trabajo",
          text: "¿Sientes que tu carga de trabajo esta semana ha sido manejable?",
          type: "scale",
          min: "Imposible",
          max: "Sin problema",
        },
        {
          id: 5,
          eyebrow: "Comentario libre",
          text: "¿Hay algo que quieras compartir con Recursos Humanos? (opcional)",
          type: "open",
        },
      ];

      let currentQ = 0;
      let answers = {};
      let workerName = "";

      // Splash → App y Carga de Encuesta desde Backend
      window.addEventListener("DOMContentLoaded", () => {
        fetchActiveSurvey();
        setTimeout(() => {
          document.getElementById("splash").classList.add("hide");
          document.getElementById("app").classList.add("visible");
        }, 2600);
      });

      // Cargar encuesta activa enviada por RRHH desde Google Sheets
      async function fetchActiveSurvey() {
        if (!SCRIPT_URL || SCRIPT_URL.includes("TU_SCRIPT_ID_AQUI")) return;
        try {
          const res = await fetch(`${SCRIPT_URL}?action=getEncuesta`);
          const data = await res.json();
          if (data && data.preguntas && data.preguntas.length > 0) {
            QUESTIONS = data.preguntas;
          }
        } catch (err) {
          console.log("Cargando encuesta por defecto (offline o inicial)");
        }
      }

      function doLogin() {
        const num = document.getElementById("workerNum").value.trim();
        const pass = document.getElementById("workerPass").value.trim();
        if (!num || !pass) {
          alert("Por favor ingresa tu número de trabajador y contraseña.");
          return;
        }
        workerName = num;
        document.getElementById("workerLabel").textContent =
          `Trabajador #${num}`;
        document.getElementById("workerLabel").style.display = "";
        showScreen("survey");
        currentQ = 0;
        answers = {};
        renderQuestion();
      }

      function showScreen(name) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(`screen-${name}`).classList.add("active");
      }

      function renderQuestion() {
        const q = QUESTIONS[currentQ];
        const total = QUESTIONS.length;

        document.getElementById("progressFill").style.width =
          `${((currentQ + 1) / total) * 100}%`;
        document.getElementById("progressLabel").textContent =
          `${currentQ + 1} / ${total}`;
        document.getElementById("btnBack").style.display =
          currentQ > 0 ? "block" : "none";
        document.getElementById("btnNext").disabled =
          !answers[q.id] && q.type !== "open";

        if (currentQ === total - 1) {
          document.getElementById("btnNext").innerHTML =
            'Enviar <i class="fa-solid fa-check"></i>';
        } else {
          document.getElementById("btnNext").innerHTML =
            'Siguiente <i class="fa-solid fa-arrow-right"></i>';
        }

        let html = `
    <div class="question-card">
      <p class="question-eyebrow">${q.eyebrow || "Pregunta"}</p>
      <p class="question-text">${q.text}</p>
  `;

        if (q.type === "emoji") {
          const opts = q.options || [
            {
              icon: "fa-regular fa-face-grin-stars",
              label: "Excelente",
              value: 5,
            },
            { icon: "fa-regular fa-face-smile", label: "Bien", value: 4 },
            { icon: "fa-regular fa-face-meh", label: "Regular", value: 3 },
            { icon: "fa-regular fa-face-frown", label: "Mal", value: 2 },
            { icon: "fa-regular fa-face-tired", label: "Agotado", value: 1 },
          ];
          html += '<div class="emoji-grid">';
          opts.forEach((opt) => {
            const sel = answers[q.id] === opt.value ? " selected" : "";
            html += `
        <button class="emoji-btn${sel}" onclick="selectEmoji(${q.id}, ${opt.value}, this)">
          <i class="${opt.icon}"></i>
          <span>${opt.label}</span>
        </button>`;
          });
          html += "</div>";
        }

        if (q.type === "scale") {
          html += '<div class="scale-bar">';
          for (let i = 1; i <= 10; i++) {
            const sel = answers[q.id] === i ? " selected" : "";
            html += `<button class="scale-btn${sel}" onclick="selectScale(${q.id}, ${i}, this)">${i}</button>`;
          }
          html += `</div>
    <div class="scale-labels">
      <span>${q.min || "Mínimo"}</span>
      <span>${q.max || "Máximo"}</span>
    </div>`;
        }

        if (q.type === "open") {
          const val = answers[q.id] || "";
          html += `<textarea class="open-textarea" rows="4" placeholder="Escribe aquí tu comentario..."
      onInput="answers[${q.id}] = this.value">${val}</textarea>`;
          document.getElementById("btnNext").disabled = false;
        }

        html += "</div>";
        document.getElementById("questionContainer").innerHTML = html;
      }

      function selectEmoji(qId, value, el) {
        answers[qId] = value;
        el.closest(".emoji-grid")
          .querySelectorAll(".emoji-btn")
          .forEach((b) => b.classList.remove("selected"));
        el.classList.add("selected");
        document.getElementById("btnNext").disabled = false;
      }

      function selectScale(qId, value, el) {
        answers[qId] = value;
        el.closest(".scale-bar")
          .querySelectorAll(".scale-btn")
          .forEach((b) => b.classList.remove("selected"));
        el.classList.add("selected");
        document.getElementById("btnNext").disabled = false;
      }

      function nextQuestion() {
        if (currentQ < QUESTIONS.length - 1) {
          currentQ++;
          renderQuestion();
        } else {
          submitAnswers();
        }
      }

      function prevQuestion() {
        if (currentQ > 0) {
          currentQ--;
          renderQuestion();
        }
      }

      // Enviar las respuestas a Google Sheets en segundo plano
      async function submitAnswers() {
        showThanks();
        if (!SCRIPT_URL || SCRIPT_URL.includes("TU_SCRIPT_ID_AQUI")) return;

        try {
          await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "saveRespuesta",
              codigoTrabajador: workerName,
              respuestas: answers,
            }),
          });
        } catch (err) {
          console.error("Error guardando respuesta:", err);
        }
      }

      function showThanks() {
        showScreen("thanks");
        let s = 15;
        document.getElementById("countdownLabel").textContent =
          `Regresando al inicio en ${s}s...`;
        const iv = setInterval(() => {
          s--;
          document.getElementById("countdownLabel").textContent =
            `Regresando al inicio en ${s}s...`;
          if (s <= 0) {
            clearInterval(iv);
            resetApp();
          }
        }, 1000);
      }

      function resetApp() {
        document.getElementById("workerNum").value = "";
        document.getElementById("workerPass").value = "";
        document.getElementById("workerLabel").style.display = "none";
        currentQ = 0;
        answers = {};
        showScreen("login");
      }
    </script>
  </body>
</html>
